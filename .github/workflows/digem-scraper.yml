name: dig-em Scraper Pipeline

# ==================== 1️⃣ 트리거 설정 ====================
on:
  # 24시간마다 정해진 시간에 실행 (UTC 기준)
  schedule:
    - cron: '0 0 * * *'  # 매일 00:00 UTC (한국 시간 09:00)

  # 수동 트리거 (GitHub UI에서 "Run workflow" 클릭 가능)
  workflow_dispatch:

# ==================== 2️⃣ 환경 변수 ====================
env:
  AIRFLOW_HOME: ./airflow
  PYTHONPATH: .
  # GitHub Secrets에서 가져온 환경 변수
  # GitHub Settings → Secrets and variables → Actions에서 설정
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

# ==================== 3️⃣ 실제 작업 ====================
jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # Step 1: 코드 체크아웃 (GitHub에서 코드 다운로드)
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Python 설정 (버전 3.11)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'  # pip 캐시 (속도 개선)

      # Step 3: 의존성 설치
      # ** 왜 이 단계가 필요한가?
      # - Airflow + 스크래퍼 의존성 설치
      # - 로컬에서는 이미 venv에 설치했지만, GitHub Actions 환경은 매번 새로 시작
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install apache-airflow==2.10.0

      # Step 4: Airflow 초기화
      # ** 왜 필요한가?
      # - GitHub Actions 환경에서 Airflow 메타데이터 DB 생성
      # - 로컬과 달리 매번 새로운 환경이므로 초기화 필수
      - name: Initialize Airflow
        run: |
          airflow db init
          airflow users create \
            --username admin \
            --password admin \
            --firstname Admin \
            --lastname User \
            --role Admin \
            --email admin@example.com || true

      # Step 5: DAG 파일 검증
      # ** 왜 필요한가?
      # - 실행 전에 DAG 파일에 문법 오류가 없는지 확인
      # - 문법 오류가 있으면 실행 중단 (실패 처리)
      - name: Validate DAG
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from airflow.dags.digem_scraper_pipeline import dag
          print(f'DAG ID: {dag.dag_id}')
          print(f'Tasks: {len(dag.tasks)}')
          for task in dag.tasks:
            print(f'  - {task.task_id}')
          "

      # Step 6: Airflow DAG 실행 (핵심!)
      # ** 이게 뭐 하는 건가?
      # - 'digem_scraper_pipeline' DAG를 실행
      # - airflow dags test: 로컬 실행 (백그라운드 스케줄러 없음)
      # - 모든 Task가 순차적으로 실행됨 (또는 병렬, 설정에 따라)
      - name: Run Airflow DAG
        run: |
          airflow dags test digem_scraper_pipeline

      # Step 7: 성공 알림 (선택)
      - name: Notify Success
        if: success()
        run: |
          echo "✅ DAG 실행 성공!"
          echo "DAG ID: digem_scraper_pipeline"

      # Step 8: 실패 알림 (선택)
      # ** 나중에 Gmail로 변경 예정 (Step 5)
      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ DAG 실행 실패!"
          echo "자세한 로그는 GitHub Actions에서 확인하세요"

# ==================== 설명 ====================
#
# ** 이 워크플로우의 흐름 **
#
# 1. 24시간마다 자동 실행 (또는 수동 실행)
# 2. Ubuntu 최신 버전 환경에서 실행
# 3. Python 3.11 설치
# 4. Airflow + 스크래퍼 의존성 설치
# 5. Airflow 초기화 (DB 생성, 계정 생성)
# 6. DAG 파일 검증 (문법 확인)
# 7. DAG 실행 (airflow dags test)
# 8. 결과 알림 (성공/실패)
#
# ** airflow dags test vs airflow dags trigger **
# - dags test: 동기 실행 (결과를 기다림, GitHub Actions에 적합)
# - dags trigger: 비동기 실행 (스케줄러 필요, 클라우드 Airflow에 적합)
#
# 우리는 dags test 사용 (GitHub Actions는 스케줄러가 없음)
#
# ** 환경 변수 설정 (나중에) **
# GitHub Settings → Secrets and variables → Actions 에서 추가:
# - SUPABASE_URL
# - SUPABASE_SERVICE_ROLE_KEY
# - GEMINI_API_KEY
# 등이 필요하면 여기서 설정
